<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>居酒屋オーダー管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f5f6f8;
      padding-bottom: 100px;
      -webkit-tap-highlight-color: transparent;
    }
    .topbar {
      background: linear-gradient(90deg, #1a1f2b, #2c3344);
      color: #fff;
    }
    .summary-card {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 10px;
      min-width: 80px;
      text-align: center;
    }
    .summary-card .label { font-size: 0.7rem; opacity: 0.8; }
    .summary-card .amount { font-size: 1.05rem; font-weight: 700; }

    /* 席ボタン */
    .seat-btn {
      width: 100%;
      min-height: 92px;
      border-radius: 14px;
      border: 2px solid transparent;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: transform 0.06s, box-shadow 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      font-weight: 600;
    }
    .seat-btn:active { transform: scale(0.97); }
    .seat-btn .seat-name { font-size: 0.95rem; }
    .seat-btn .seat-amount { font-size: 1.15rem; margin-top: 2px; font-weight: 800; }
    .seat-btn .seat-meta { font-size: 0.7rem; opacity: 0.85; margin-top: 1px; }

    .seat-empty  { background:#ffffff; border-color:#dee2e6; color:#868e96; }
    .seat-active { background:#198754; border-color:#146c43; color:#fff; }
    .seat-leader { background:#0d6efd; border-color:#0a58ca; color:#fff; }
    .seat-member { background:#adb5bd; border-color:#868e96; color:#fff; }
    .seat-selected { box-shadow: 0 0 0 4px #ffc107 !important; }

    .table-btn { min-height: 110px; }
    .table-btn .seat-name  { font-size: 1.2rem; }
    .table-btn .seat-amount { font-size: 1.4rem; }

    /* メニューボタン */
    .menu-btn {
      width: 100%;
      min-height: 70px;
      border-radius: 10px;
      padding: 6px 4px;
      font-weight: 600;
      text-align: center;
      white-space: normal;
      line-height: 1.2;
    }
    .menu-btn .price { font-size: 0.85rem; opacity: 0.85; display:block; margin-top:3px; }
    .cat-tab.active { background:#0d6efd; color:#fff; }

    .bill-list { max-height: 35vh; overflow-y: auto; }
    .bill-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px dashed #dee2e6;
      font-size: 0.95rem;
    }
    .bill-row .name { flex: 1; min-width: 0; }
    .bill-row .qty  { width: 50px; text-align: center; color:#6c757d; }
    .bill-row .amt  { width: 80px; text-align: right; font-variant-numeric: tabular-nums; }
    .bill-row .del  { margin-left: 6px; color: #dc3545; cursor: pointer; }

    .total-line { font-size: 1.4rem; font-weight: 800; color: #0d6efd; }

    .group-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff3cd;
      border-top: 2px solid #ffc107;
      padding: 10px 12px;
      z-index: 1080;
      box-shadow: 0 -4px 8px rgba(0,0,0,0.05);
    }

    @media (max-width: 360px) {
      .seat-btn .seat-amount { font-size: 1.0rem; }
      .summary-card { min-width: 64px; padding: 4px 6px; }
      .summary-card .amount { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="topbar sticky-top py-2 px-2">
  <div class="d-flex justify-content-between align-items-center gap-2">
    <h6 class="mb-0 fw-bold">🏮 オーダー</h6>
    <div class="d-flex gap-1 flex-wrap justify-content-end">
      <div class="summary-card"><div class="label">今日</div><div class="amount" id="sumToday">¥0</div></div>
      <div class="summary-card"><div class="label">今週</div><div class="amount" id="sumWeek">¥0</div></div>
      <div class="summary-card"><div class="label">今月</div><div class="amount" id="sumMonth">¥0</div></div>
    </div>
  </div>
</div>

<!-- メイン -->
<div class="container-fluid mt-3">

  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="text-muted small fw-bold">カウンター席</div>
    <div>
      <button class="btn btn-sm btn-outline-secondary" id="btnRefresh">🔄</button>
      <button class="btn btn-sm btn-outline-warning" id="btnGroupMode">🔗 グループ化</button>
    </div>
  </div>
  <div class="row g-2 mb-3" id="counterSeats"></div>

  <div class="text-muted small fw-bold mb-2">テーブル席</div>
  <div class="row g-2 mb-3" id="tableSeats"></div>

  <div class="text-center text-muted small mt-3">
    税率10% / お通し代は席を開く時に自動計上
  </div>
</div>

<!-- グループ化バナー -->
<div id="groupBanner" class="group-banner d-none">
  <div class="d-flex justify-content-between align-items-center">
    <div class="small">
      🔗 グループ化する<strong>カウンター席</strong>を2つ以上タップ<br>
      <span id="groupSelectedLabel" class="text-secondary"></span>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-warning" id="btnConfirmGroup">確定</button>
      <button class="btn btn-sm btn-outline-secondary" id="btnCancelGroup">中止</button>
    </div>
  </div>
</div>

<!-- 席を開くモーダル -->
<div class="modal fade" id="openModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="openModalTitle">席を開く</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2 small text-muted">人数を入力してください（お通し代を自動加算します）</div>
        <div class="d-flex justify-content-center align-items-center gap-3 my-3">
          <button class="btn btn-outline-secondary btn-lg" id="guestsMinus">−</button>
          <div class="display-4 fw-bold" id="guestsValue">2</div>
          <button class="btn btn-outline-secondary btn-lg" id="guestsPlus">+</button>
        </div>
        <div class="text-center text-muted small">名様</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary" id="btnOpenConfirm">開店</button>
      </div>
    </div>
  </div>
</div>

<!-- 注文・伝票モーダル -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-fullscreen-sm-down modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h5 class="modal-title" id="orderModalTitle">席</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-2">

        <!-- 伝票エリア -->
        <div class="card mb-2">
          <div class="card-body p-2">
            <div class="d-flex justify-content-between small text-muted mb-1">
              <span id="orderModalGuests">— 名</span>
              <span id="orderModalGroup"></span>
            </div>
            <div class="bill-list" id="billList"></div>
            <div class="d-flex justify-content-between mt-2 small">
              <span>小計</span><span id="billSubtotal">¥0</span>
            </div>
            <div class="d-flex justify-content-between small">
              <span>消費税(10%)</span><span id="billTax">¥0</span>
            </div>
            <div class="d-flex justify-content-between mt-1">
              <span class="fw-bold">合計</span>
              <span class="total-line" id="billTotal">¥0</span>
            </div>
          </div>
        </div>

        <!-- カテゴリタブ -->
        <div class="d-flex flex-wrap gap-1 mb-2" id="catTabs"></div>

        <!-- メニュー -->
        <div class="row g-2" id="menuGrid"></div>
      </div>
      <div class="modal-footer p-2 d-flex justify-content-between flex-wrap gap-1">
        <div>
          <button class="btn btn-outline-secondary btn-sm d-none" id="btnUngroup">グループ解除</button>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary" data-bs-dismiss="modal">閉じる</button>
          <button class="btn btn-danger" id="btnCheckout">💴 会計</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 会計完了モーダル -->
<div class="modal fade" id="resultModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <div class="display-1">✅</div>
        <h4 class="mt-2">会計完了</h4>
        <div class="text-muted" id="resultSeat">—</div>
        <div class="display-5 fw-bold text-primary mt-2" id="resultTotal">¥0</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary w-100" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- ローディング -->
<div id="loading" class="position-fixed top-0 start-0 w-100 h-100 d-none"
     style="background:rgba(0,0,0,0.3); z-index:2000;">
  <div class="position-absolute top-50 start-50 translate-middle">
    <div class="spinner-border text-light" style="width:3rem; height:3rem;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===== 状態 =====
let DASHBOARD = null;
let CURRENT_SEAT = null;     // 注文モーダル対象
let CURRENT_BILL = null;
let CURRENT_CATEGORY = null;
let GROUP_MODE = false;
let GROUP_SELECTED = [];

const openModal    = new bootstrap.Modal(document.getElementById('openModal'));
const orderModal   = new bootstrap.Modal(document.getElementById('orderModal'));
const resultModal  = new bootstrap.Modal(document.getElementById('resultModal'));

// ===== ユーティリティ =====
function fmt(n) { return '¥' + (Number(n) || 0).toLocaleString(); }
function showLoading(b) { document.getElementById('loading').classList.toggle('d-none', !b); }

function call(fn, args, onSuccess) {
  showLoading(true);
  let runner = google.script.run
    .withSuccessHandler(d => { showLoading(false); if (onSuccess) onSuccess(d); })
    .withFailureHandler(e => { showLoading(false); alert('エラー: ' + (e.message || e)); });
  runner[fn].apply(runner, args || []);
}

// ===== 初期表示 =====
function init() {
  call('getDashboard', [], d => { DASHBOARD = d; render(); });
}

// ===== 描画 =====
function render() {
  document.getElementById('sumToday').textContent = fmt(DASHBOARD.summary.today);
  document.getElementById('sumWeek').textContent  = fmt(DASHBOARD.summary.week);
  document.getElementById('sumMonth').textContent = fmt(DASHBOARD.summary.month);

  const counter = document.getElementById('counterSeats');
  const table   = document.getElementById('tableSeats');
  counter.innerHTML = '';
  table.innerHTML = '';

  DASHBOARD.seats.forEach(s => {
    const col = document.createElement('div');
    col.className = s.isCounter ? 'col-3' : 'col-6';

    let cls = 'seat-empty';
    let amount = '空席';
    let meta = '';
    if (s.isMember) {
      cls = 'seat-member';
      const leader = DASHBOARD.seats.find(x => x.seatId === s.groupLeader);
      meta = '→ ' + (leader ? leader.label : s.groupLeader);
      amount = '🔗';
    } else if (s.isLeader) {
      cls = 'seat-leader';
      amount = fmt(s.taxIncluded);
      const others = s.groupMembers.filter(m => m !== s.seatId).map(m => {
        const ss = DASHBOARD.seats.find(x => x.seatId === m);
        return ss ? ss.label : m;
      });
      meta = '🔗 +' + others.join('・') + ' / ' + s.guests + '名';
    } else if (s.isOpen) {
      cls = 'seat-active';
      amount = fmt(s.taxIncluded);
      meta = s.guests + '名';
    }

    if (GROUP_MODE && GROUP_SELECTED.indexOf(s.seatId) >= 0) {
      cls += ' seat-selected';
    }

    const btn = document.createElement('button');
    btn.className = 'seat-btn ' + cls + (s.isCounter ? '' : ' table-btn');
    btn.innerHTML =
      '<div class="seat-name">' + s.label + '</div>' +
      '<div class="seat-amount">' + amount + '</div>' +
      '<div class="seat-meta">' + meta + '</div>';
    btn.onclick = () => onSeatClick(s);

    col.appendChild(btn);
    (s.isCounter ? counter : table).appendChild(col);
  });

  // グループバナー
  const banner = document.getElementById('groupBanner');
  if (GROUP_MODE) {
    banner.classList.remove('d-none');
    const labels = GROUP_SELECTED.map(id => {
      const ss = DASHBOARD.seats.find(x => x.seatId === id);
      return ss ? ss.label : id;
    });
    document.getElementById('groupSelectedLabel').textContent =
      labels.length ? '選択中: ' + labels.join(', ') : '選択中: なし';
  } else {
    banner.classList.add('d-none');
  }
}

// ===== 席タップ =====
function onSeatClick(seat) {
  if (GROUP_MODE) {
    if (!seat.isCounter) { alert('カウンター席のみグループ化できます'); return; }
    if (seat.isMember)   { alert('既に別グループのメンバーです'); return; }
    const idx = GROUP_SELECTED.indexOf(seat.seatId);
    if (idx >= 0) GROUP_SELECTED.splice(idx, 1);
    else GROUP_SELECTED.push(seat.seatId);
    render();
    return;
  }
  if (seat.isMember) {
    // メンバーをタップ → リーダーの伝票を開く
    const leader = DASHBOARD.seats.find(x => x.seatId === seat.groupLeader);
    if (leader) showOrderModal(leader);
    return;
  }
  if (!seat.isOpen) {
    showOpenModal(seat);
  } else {
    showOrderModal(seat);
  }
}

// ===== 席を開く =====
let pendingSeat = null;
function showOpenModal(seat) {
  pendingSeat = seat;
  document.getElementById('openModalTitle').textContent = seat.label + ' を開く';
  document.getElementById('guestsValue').textContent = '2';
  openModal.show();
}
document.getElementById('guestsMinus').onclick = () => {
  const el = document.getElementById('guestsValue');
  const n = Math.max(1, Number(el.textContent) - 1);
  el.textContent = n;
};
document.getElementById('guestsPlus').onclick = () => {
  const el = document.getElementById('guestsValue');
  const n = Math.min(20, Number(el.textContent) + 1);
  el.textContent = n;
};
document.getElementById('btnOpenConfirm').onclick = () => {
  const guests = Number(document.getElementById('guestsValue').textContent);
  if (!pendingSeat || guests < 1) return;
  openModal.hide();
  call('openSeat', [pendingSeat.seatId, guests], d => {
    DASHBOARD = d;
    render();
    // 開いた直後に注文モーダルを開く
    const updated = DASHBOARD.seats.find(x => x.seatId === pendingSeat.seatId);
    if (updated) showOrderModal(updated);
  });
};

// ===== 注文モーダル =====
function showOrderModal(seat) {
  CURRENT_SEAT = seat;
  CURRENT_CATEGORY = null;
  document.getElementById('orderModalTitle').textContent = seat.label;
  document.getElementById('btnUngroup').classList.toggle('d-none', !seat.isLeader);
  renderCategoryTabs();
  loadBill();
  orderModal.show();
}

function renderCategoryTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  const cats = Array.from(new Set(DASHBOARD.menu.map(m => m.category)));
  ['すべて'].concat(cats).forEach(c => {
    const b = document.createElement('button');
    b.className = 'btn btn-sm btn-outline-primary cat-tab' +
      ((CURRENT_CATEGORY === c || (c === 'すべて' && !CURRENT_CATEGORY)) ? ' active' : '');
    b.textContent = c;
    b.onclick = () => {
      CURRENT_CATEGORY = (c === 'すべて') ? null : c;
      renderCategoryTabs();
      renderMenu();
    };
    tabs.appendChild(b);
  });
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  const items = DASHBOARD.menu.filter(m =>
    !CURRENT_CATEGORY || m.category === CURRENT_CATEGORY
  );
  items.forEach(m => {
    const col = document.createElement('div');
    col.className = 'col-4 col-sm-3';
    const b = document.createElement('button');
    b.className = 'btn btn-outline-dark menu-btn';
    b.innerHTML = m.name + '<span class="price">' + fmt(m.price) + '</span>';
    b.onclick = () => addOrder(m);
    col.appendChild(b);
    grid.appendChild(col);
  });
}

function loadBill() {
  call('getSeatBill', [CURRENT_SEAT.seatId], bill => {
    CURRENT_BILL = bill;
    renderBill();
  });
}

function renderBill() {
  const list = document.getElementById('billList');
  list.innerHTML = '';
  if (!CURRENT_BILL.items.length) {
    list.innerHTML = '<div class="text-center text-muted py-3 small">注文はまだありません</div>';
  } else {
    // 同じ商品＆同じ単価をまとめて表示（取消は1行ずつ）
    CURRENT_BILL.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'bill-row';
      row.innerHTML =
        '<div class="name">' + item.product + '</div>' +
        '<div class="qty">×' + item.qty + '</div>' +
        '<div class="amt">' + fmt(item.subtotal) + '</div>' +
        '<div class="del" title="取消">✕</div>';
      row.querySelector('.del').onclick = () => {
        if (!confirm(item.product + ' を取消しますか？')) return;
        call('removeOrderItem', [item.row], d => {
          DASHBOARD = d;
          render();
          loadBill();
        });
      };
      list.appendChild(row);
    });
  }
  document.getElementById('billSubtotal').textContent = fmt(CURRENT_BILL.subtotal);
  document.getElementById('billTax').textContent      = fmt(CURRENT_BILL.tax);
  document.getElementById('billTotal').textContent    = fmt(CURRENT_BILL.total);
  document.getElementById('orderModalGuests').textContent = CURRENT_BILL.guests + ' 名';
  document.getElementById('orderModalGroup').textContent =
    CURRENT_BILL.members.length > 1 ? '🔗 ' + CURRENT_BILL.membersLabel : '';
}

function addOrder(menuItem) {
  call('addOrder',
    [CURRENT_SEAT.seatId, menuItem.name, menuItem.price, 1],
    d => {
      DASHBOARD = d;
      render();
      loadBill();
    });
}

// ===== 会計 =====
document.getElementById('btnCheckout').onclick = () => {
  if (!CURRENT_SEAT) return;
  if (!CURRENT_BILL || CURRENT_BILL.items.length === 0) {
    alert('注文がありません'); return;
  }
  if (!confirm(CURRENT_BILL.membersLabel || CURRENT_SEAT.label +
               '\n合計 ' + fmt(CURRENT_BILL.total) + '\n会計しますか？')) return;
  call('checkout', [CURRENT_SEAT.seatId], r => {
    DASHBOARD = r.dashboard;
    render();
    orderModal.hide();
    document.getElementById('resultSeat').textContent = r.seatLabel;
    document.getElementById('resultTotal').textContent = fmt(r.total);
    resultModal.show();
  });
};

// ===== グループ解除 =====
document.getElementById('btnUngroup').onclick = () => {
  if (!CURRENT_SEAT) return;
  if (!confirm('このグループを解除しますか？\n（注文は ' + CURRENT_SEAT.label + ' に集約されます）')) return;
  call('ungroupSeat', [CURRENT_SEAT.seatId], d => {
    DASHBOARD = d;
    render();
    orderModal.hide();
  });
};

// ===== グループ化モード =====
document.getElementById('btnGroupMode').onclick = () => {
  GROUP_MODE = true;
  GROUP_SELECTED = [];
  render();
};
document.getElementById('btnCancelGroup').onclick = () => {
  GROUP_MODE = false;
  GROUP_SELECTED = [];
  render();
};
document.getElementById('btnConfirmGroup').onclick = () => {
  if (GROUP_SELECTED.length < 2) { alert('2席以上選択してください'); return; }
  call('groupSeats', [GROUP_SELECTED], d => {
    DASHBOARD = d;
    GROUP_MODE = false;
    GROUP_SELECTED = [];
    render();
  });
};

// ===== 更新 =====
document.getElementById('btnRefresh').onclick = init;

// 自動リロード（30秒に1回）
setInterval(() => { if (!GROUP_MODE) init(); }, 30000);

// 起動
init();
</script>
</body>
</html>
